    rev: v8.30.0
    hooks:
      - id: gitleaks
        stages: [pre-commit, manual]

  # ── conventional commits ─────────────────────
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.6
    hooks:
      - id: commitizen
        stages: [commit-msg]
