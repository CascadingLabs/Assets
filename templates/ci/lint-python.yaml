# Cascading Labs — Python Lint CI (runs parallel to main CI)
# Covers: ruff check, ruff format, pyproject-fmt

name: Lint (Python)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  ruff:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check (no auto-fix)
        run: uv run ruff check --no-fix --exit-non-zero-on-fix .

      - name: Ruff format check
        run: uv run ruff format --check .

  pyproject-fmt:
    name: pyproject.toml format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install pyproject-fmt
        run: uv tool install pyproject-fmt

      - name: Check pyproject.toml formatting
        run: uvx pyproject-fmt --check pyproject.toml
