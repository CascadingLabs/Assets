# Cascading Labs — Ban unittest imports (use pytest/pytest-mock)
# Runs the check_no_unittest.py script against all Python files.
# Drop scripts/check_no_unittest.py into your repo and reference this workflow.

name: Check No Unittest

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"
  push:
    branches:
      - main
    paths:
      - "**.py"

jobs:
  no-unittest:
    name: Ban unittest imports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Check for unittest imports
        run: uv run python scripts/check_no_unittest.py
